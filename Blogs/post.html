<!DOCTYPE html>
<html lang="en" x-data :class="{ 'dark': $store.app.darkMode }" :data-theme="$store.app.darkMode ? 'dark' : 'light'">
<script>
// 在页面渲染前立即应用主题，防止闪烁
(function() {
    const theme = localStorage.getItem('theme') || 'light';
    if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', 'dark');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
    }
})();
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Yiming Chen</title>
    <!-- 外部资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="../assets/css/custom.css">

    <!-- MathJax for rendering LaTeX formulas -->
    <script>
    MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\(', '\)']],
            displayMath: [['$$', '$$'], ['\[', '\]']],
            processEscapes: true,
            processEnvironments: true
        },
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
            ignoreHtmlClass: 'tex2jax_ignore',
            processHtmlClass: 'tex2jax_process'
        },
        startup: {
            pageReady: () => {
                return MathJax.startup.defaultPageReady().then(() => {
                    console.log('MathJax initial rendering complete');
                });
            }
        }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* Alpine.js x-cloak 样式 - 防止闪烁 */
        [x-cloak] { display: none !important; }

        /* Markdown 内容样式 */
        .markdown-body {
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            font-weight: 700;
            line-height: 1.3;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }

        .markdown-body h1 { font-size: 2.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.3em; margin-top: 0; }
        /* 隐藏 Markdown 中的第一个 h1 标题，因为页面顶部已有标题 */
        .markdown-body > h1:first-child { display: none; }
        .markdown-body h2 { font-size: 1.875rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.5rem; }
        .markdown-body h4 { font-size: 1.25rem; }

        .dark .markdown-body h1,
        .dark .markdown-body h2 {
            border-bottom-color: #374151;
        }

        .markdown-body p { margin-bottom: 1em; }

        .markdown-body a {
            color: #3b82f6;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .dark .markdown-body a { color: #60a5fa; }

        .markdown-body strong { font-weight: 700; }
        .markdown-body em { font-style: italic; }

        .markdown-body ul, .markdown-body ol {
            padding-left: 2em;
            margin-bottom: 1em;
        }

        .markdown-body li { margin-bottom: 0.5em; }

        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }

        .markdown-body blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1em;
            margin-left: 0;
            color: #6b7280;
            font-style: italic;
        }

        .dark .markdown-body blockquote {
            border-left-color: #60a5fa;
            color: #9ca3af;
        }

        .markdown-body code {
            background-color: #f3f4f6;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }

        .dark .markdown-body code {
            background-color: #374151;
        }

        .markdown-body pre {
            background-color: #1f2937;
            color: #e5e7eb;
            padding: 1em;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1em;
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }

        .markdown-body img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1em 0;
        }

        /* MathJax 公式居中 */
        .markdown-body .MathJax,
        .markdown-body .MathJax_Display,
        .markdown-body .MathJax_Preview,
        .markdown-body mjx-container {
            margin-left: auto !important;
            margin-right: auto !important;
            text-align: center !important;
        }

        .markdown-body mjx-container {
            display: inline-block;
            margin: 1em auto;
        }

        /* 行内公式不需要居中 */
        .markdown-body p mjx-container:not([display="true"]) {
            display: inline !important;
            margin: 0 !important;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1em;
        }

        .markdown-body th,
        .markdown-body td {
            border: 1px solid #e5e7eb;
            padding: 0.5em 1em;
            text-align: left;
        }

        .dark .markdown-body th,
        .dark .markdown-body td {
            border-color: #374151;
        }

        .markdown-body th {
            background-color: #f9fafb;
            font-weight: 600;
        }

        .dark .markdown-body th {
            background-color: #1f2937;
        }

        .markdown-body hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 2em 0;
        }

        .dark .markdown-body hr {
            border-top-color: #374151;
        }

        /* 目录样式 */
        .toc-list {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }

        .toc-item {
            margin-bottom: 0;
        }

        .toc-link {
            display: block;
            padding: 0.25rem 0.5rem;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.875rem;
            line-height: 1.4;
            border-left: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .toc-link:hover {
            color: #3b82f6;
        }

        .toc-link.active {
            color: #3b82f6;
            border-left-color: #3b82f6;
            font-weight: 500;
        }

        .dark .toc-link {
            color: #9ca3af;
        }

        .dark .toc-link:hover {
            color: #60a5fa;
        }

        .dark .toc-link.active {
            color: #60a5fa;
            border-left-color: #60a5fa;
        }

        /* 目录层级缩进 */
        .toc-level-2 {
            padding-left: 0.5rem;
        }

        .toc-level-3 {
            padding-left: 1rem;
        }

        .toc-level-4 {
            padding-left: 1.5rem;
        }

        .toc-level-5 {
            padding-left: 2rem;
        }

        .toc-level-6 {
            padding-left: 2.5rem;
        }

        /* 为文章标题添加锚点样式 */
        .markdown-body h2[id],
        .markdown-body h3[id],
        .markdown-body h4[id],
        .markdown-body h5[id],
        .markdown-body h6[id] {
            scroll-margin-top: 100px;
        }

        /* 自定义滚动条样式 */
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: #d1d5db;
            border-radius: 3px;
        }

        .dark .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: #4b5563;
        }

        .scrollbar-thin:hover::-webkit-scrollbar-thumb {
            background-color: #9ca3af;
        }

        .dark .scrollbar-thin:hover::-webkit-scrollbar-thumb {
            background-color: #6b7280;
        }

        /* Firefox 滚动条样式 */
        .scrollbar-thin {
            scrollbar-width: thin;
            scrollbar-color: #d1d5db transparent;
        }

        .dark .scrollbar-thin {
            scrollbar-color: #4b5563 transparent;
        }
    </style>

    <!-- 配置 -->
    <script>
        const savedLang = localStorage.getItem('lang') || 'en';
        const savedTheme = localStorage.getItem('theme') || 'light';
        const savedDarkMode = savedTheme === 'dark';

        document.addEventListener('alpine:init', () => {
            Alpine.store('app', Alpine.reactive({
                lang: savedLang,
                darkMode: savedDarkMode,
                mobileMenuOpen: false,
                currentPost: null,
                prevPost: null,
                nextPost: null,
                showContent: false,
                notFound: false,
                readTime: null
            }));

            Alpine.effect(() => {
                localStorage.setItem('lang', Alpine.store('app').lang);
            });

            Alpine.effect(() => {
                const darkMode = Alpine.store('app').darkMode;
                const theme = darkMode ? 'dark' : 'light';
                localStorage.setItem('theme', theme);
                document.documentElement.setAttribute('data-theme', theme);
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            });
        });

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#1a1a1a',
                        darkCard: '#2d2d2d'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkBg dark:text-gray-200 antialiased">
    <!-- 导航 -->
    <nav class="sticky top-0 z-40 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b dark:border-gray-700">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="./" class="font-bold text-xl tracking-tighter hover:text-blue-500 transition">
                <i class="fa-solid fa-arrow-left mr-2"></i>
                <span x-show="$store.app.lang === 'zh'">返回博客</span>
                <span x-show="$store.app.lang === 'en'">Back to Blogs</span>
            </a>

            <div class="flex items-center space-x-4">
                <!-- 搜索框 -->
                <div class="relative hidden md:block" x-data="searchComponent()">
                    <input type="text"
                           :placeholder="$store.app.lang === 'zh' ? '搜索文章...' : 'Search articles...'"
                           x-model="searchQuery"
                           @focus="showResults = true"
                           @blur="setTimeout(() => showResults = false, 200)"
                           @input="searchPosts()"
                           class="w-48 lg:w-64 px-3 py-1.5 pl-9 text-sm bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>

                    <!-- 搜索结果下拉 -->
                    <div x-show="showResults && searchQuery.length > 0 && searchResults.length > 0"
                         x-cloak
                         class="absolute top-full right-0 mt-2 w-full bg-white dark:bg-darkCard border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl overflow-hidden z-50">
                        <div class="max-h-80 overflow-y-auto">
                            <template x-for="post in searchResults" :key="post.id">
                                <a :href="`post.html?id=${post.id}`"
                                   class="block px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800 transition border-b dark:border-gray-700 last:border-0">
                                    <p class="font-medium text-sm text-gray-900 dark:text-gray-100 mb-1" x-text="post.title[$store.app.lang]"></p>
                                    <p class="text-xs text-gray-500 dark:text-gray-400 line-clamp-1" x-text="post.description[$store.app.lang]"></p>
                                </a>
                            </template>
                        </div>
                    </div>

                    <!-- 无结果提示 -->
                    <div x-show="showResults && searchQuery.length > 0 && searchResults.length === 0"
                         x-cloak
                         class="absolute top-full right-0 mt-2 w-full bg-white dark:bg-darkCard border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl px-4 py-3 z-50">
                        <p class="text-sm text-gray-500 dark:text-gray-400 text-center">
                            <span x-show="$store.app.lang === 'zh'">未找到相关文章</span>
                            <span x-show="$store.app.lang === 'en'">No articles found</span>
                        </p>
                    </div>
                </div>

                <button @click="$store.app.lang = $store.app.lang === 'zh' ? 'en' : 'zh'" class="hover:text-blue-500">
                    <span x-show="$store.app.lang === 'zh'">EN</span>
                    <span x-show="$store.app.lang === 'en'">中</span>
                </button>
                <button @click="$store.app.darkMode = !$store.app.darkMode" class="theme-toggle text-lg" aria-label="Toggle Theme">
                    <i class="fa-solid fa-sun sun-icon"></i>
                    <i class="fa-solid fa-moon moon-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容 - 三列布局 -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        <!-- 文章未找到 -->
        <div x-show="$store.app.notFound" class="text-center py-20">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-red-100 dark:bg-red-900/30 text-red-500 mb-6">
                <i class="fa-solid fa-file-circle-xmark text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-200 mb-4">
                <span x-show="$store.app.lang === 'zh'">文章未找到</span>
                <span x-show="$store.app.lang === 'en'">Article Not Found</span>
            </h2>
            <a href="./" class="inline-flex items-center px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">
                <i class="fa-solid fa-arrow-left mr-2"></i>
                <span x-show="$store.app.lang === 'zh'">返回博客首页</span>
                <span x-show="$store.app.lang === 'en'">Back to Blogs</span>
            </a>
        </div>

        <!-- 手机端目录菜单按钮（放在 grid 外部） -->
        <div x-data="{ tocMenuOpen: false }" x-show="$store.app.showContent" x-cloak>
            <div class="fixed top-20 left-4 z-50 md:hidden">
                <button @click="tocMenuOpen = !tocMenuOpen"
                        class="w-10 h-10 bg-white dark:bg-darkCard rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 flex items-center justify-center hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                    <i class="fa-solid fa-list text-gray-600 dark:text-gray-400"></i>
                </button>

                <!-- 手机端目录弹出层 -->
                <div x-show="tocMenuOpen" x-cloak
                     class="fixed inset-0 bg-black/50 z-40"
                     @click="tocMenuOpen = false"></div>
                <div x-show="tocMenuOpen" x-cloak
                     x-transition:enter="transition ease-out duration-200"
                     x-transition:enter-start="opacity-0 -translate-x-full"
                     x-transition:enter-end="opacity-100 translate-x-0"
                     x-transition:leave="transition ease-in duration-150"
                     x-transition:leave-start="opacity-100 translate-x-0"
                     x-transition:leave-end="opacity-0 -translate-x-full"
                     class="fixed top-0 left-0 h-full w-72 bg-white dark:bg-darkCard shadow-xl z-50 overflow-y-auto">
                    <div class="p-4">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold text-gray-900 dark:text-gray-100">
                                <span x-show="$store.app.lang === 'zh'">目录</span>
                                <span x-show="$store.app.lang === 'en'">Table of Contents</span>
                            </h3>
                            <button @click="tocMenuOpen = false" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition">
                                <i class="fa-solid fa-xmark text-gray-600 dark:text-gray-400"></i>
                            </button>
                        </div>
                        <div id="toc-mobile" class="space-y-2">
                            <!-- 目录内容将通过 JS 生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 三列布局：左侧目录 | 中间正文 | 右侧文件夹 -->
        <div x-show="$store.app.showContent && $store.app.currentPost" class="grid grid-cols-1 md:grid-cols-[220px_1fr_180px] gap-6" x-cloak>

            <!-- 左侧目录 -->
            <aside class="hidden md:block">
                <div class="sticky top-24">
                    <div class="bg-transparent">
                        <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100 mb-3 flex items-center">
                            <i class="fa-solid fa-list mr-2 text-blue-500"></i>
                            <span x-show="$store.app.lang === 'zh'">目录</span>
                            <span x-show="$store.app.lang === 'en'">Contents</span>
                        </h3>
                        <nav id="toc-desktop" class="space-y-1 text-sm max-h-[calc(100vh-8rem)] overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-gray-300 dark:scrollbar-thumb-gray-600 scrollbar-track-transparent hover:scrollbar-thumb-gray-400 dark:hover:scrollbar-thumb-gray-500">
                            <!-- 目录内容将通过 JS 生成 -->
                        </nav>
                    </div>
                </div>
            </aside>

            <!-- 中间文章内容 -->
            <div class="space-y-8">
                <!-- 文章头部 -->
                <article class="bg-white dark:bg-darkCard rounded-2xl p-6 md:p-8 border border-gray-200 dark:border-gray-700">
                <!-- 标题 -->
                <h1 class="text-4xl font-extrabold mb-6 leading-tight" x-text="$store.app.currentPost?.title[$store.app.lang]"></h1>

                <!-- 元信息 -->
                <div class="flex flex-wrap items-center gap-4 pb-6 border-b dark:border-gray-700 mb-8">
                    <span class="inline-flex items-center text-sm text-gray-600 dark:text-gray-400">
                        <i class="fa-solid fa-user mr-2"></i>
                        <span x-text="$store.app.currentPost?.author || 'Yiming Chen'"></span>
                    </span>
                    <span class="inline-flex items-center text-sm text-gray-600 dark:text-gray-400">
                        <span x-show="$store.app.lang === 'zh' && BLOG_DATA.hasModifiedDate($store.app.currentPost)">修改于</span>
                        <span x-show="$store.app.lang === 'en' && BLOG_DATA.hasModifiedDate($store.app.currentPost)">Modified</span>
                        <span x-show="$store.app.lang === 'zh' && !BLOG_DATA.hasModifiedDate($store.app.currentPost)">发布于</span>
                        <span x-show="$store.app.lang === 'en' && !BLOG_DATA.hasModifiedDate($store.app.currentPost)">Published</span>
                        <i class="fa-regular fa-calendar ml-2 mr-1 text-gray-500 dark:text-gray-500"></i>
                        <span x-text="BLOG_DATA.formatDate(BLOG_DATA.getDisplayDate($store.app.currentPost), $store.app.lang)"></span>
                    </span>
                    <span class="inline-flex items-center text-sm text-gray-600 dark:text-gray-400" x-show="$store.app.readTime">
                        <i class="fa-solid fa-stopwatch mr-1 text-gray-500 dark:text-gray-500"></i>
                        <span x-show="$store.app.lang === 'zh'">大约</span>
                        <span x-show="$store.app.lang === 'en'">About</span>
                        <span x-text="$store.app.readTime"></span>
                        <span x-show="$store.app.lang === 'zh'">分钟</span>
                        <span x-show="$store.app.lang === 'en'">min</span>
                    </span>
                    <a :href="`categories.html?category=${$store.app.currentPost?.category}`"
                       class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium hover:opacity-80 transition"
                       :class="{
                           'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300': $store.app.currentPost?.category === 'learning-notes',
                           'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/40 dark:text-cyan-300': $store.app.currentPost?.category === 'paper-with-code',
                           'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300': $store.app.currentPost?.category === 'technical-report',
                           'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300': $store.app.currentPost?.category === 'project',
                           'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300': $store.app.currentPost?.category === 'essay'
                       }">
                        <i :class="BLOG_DATA.categories[$store.app.currentPost?.category]?.icon" class="mr-1"></i>
                        <span x-text="BLOG_DATA.categories[$store.app.currentPost?.category]?.name[$store.app.lang]"></span>
                    </a>
                    <template x-for="tag in $store.app.currentPost?.tags" :key="tag">
                        <a :href="`tags.html?tag=${tag}`"
                           class="inline-flex items-center px-2 py-1 rounded-md text-xs bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                            <i class="fa-solid fa-tag mr-1"></i>
                            <span x-text="BLOG_DATA.getTagName(tag, $store.app.lang)"></span>
                        </a>
                    </template>
                </div>

                <!-- Markdown 内容 -->
                <div id="markdown-content" class="markdown-body text-gray-800 dark:text-gray-200">
                    <!-- Markdown 内容将被渲染到这里 -->
                </div>
            </article>

            <!-- 导航 -->
            <div class="flex items-center justify-between bg-white dark:bg-darkCard rounded-2xl p-6 border border-gray-200 dark:border-gray-700">
                <a x-show="$store.app.prevPost" :href="`post.html?id=${$store.app.prevPost?.id}`"
                   class="flex-1 flex items-center text-left hover:text-blue-500 transition">
                    <div class="flex items-center">
                        <i class="fa-solid fa-arrow-left mr-3 text-gray-400"></i>
                        <div>
                            <p class="text-sm text-gray-500 dark:text-gray-500">
                                <span x-show="$store.app.lang === 'zh'">上一篇</span>
                                <span x-show="$store.app.lang === 'en'">Previous</span>
                            </p>
                            <p class="font-medium truncate max-w-xs" x-text="$store.app.prevPost?.title[$store.app.lang]"></p>
                        </div>
                    </div>
                </a>

                <a href="./" class="px-6 py-2 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition text-center">
                    <i class="fa-solid fa-list mr-2"></i>
                    <span x-show="$store.app.lang === 'zh'">所有文章</span>
                    <span x-show="$store.app.lang === 'en'">All Posts</span>
                </a>

                <a x-show="$store.app.nextPost" :href="`post.html?id=${$store.app.nextPost?.id}`"
                   class="flex-1 flex items-center justify-end text-right hover:text-blue-500 transition">
                    <div class="flex items-center">
                        <div>
                            <p class="text-sm text-gray-500 dark:text-gray-500">
                                <span x-show="$store.app.lang === 'zh'">下一篇</span>
                                <span x-show="$store.app.lang === 'en'">Next</span>
                            </p>
                            <p class="font-medium truncate max-w-xs" x-text="$store.app.nextPost?.title[$store.app.lang]"></p>
                        </div>
                        <i class="fa-solid fa-arrow-right ml-3 text-gray-400"></i>
                    </div>
                </a>
            </div>
        </div>

        <!-- 右侧文件夹模块 -->
        <aside class="hidden md:block">
            <div class="sticky top-24">
                <div class="bg-transparent">
                    <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100 mb-3 flex items-center">
                        <i class="fa-solid fa-folder-open mr-2 text-green-500"></i>
                        <span x-show="$store.app.lang === 'zh'">分类</span>
                        <span x-show="$store.app.lang === 'en'">Categories</span>
                    </h3>
                    <div x-data="{ expandedCategories: {} }" x-init="expandedCategories[$store.app.currentPost?.category] = true" class="space-y-2 max-h-[calc(100vh-8rem)] overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-gray-300 dark:scrollbar-thumb-gray-600 scrollbar-track-transparent hover:scrollbar-thumb-gray-400 dark:hover:scrollbar-thumb-gray-500">
                        <template x-for="[catId, category] in Object.entries(BLOG_DATA.categories)" :key="catId">
                            <div>
                                <!-- 分类标题 -->
                                <a @click.prevent="expandedCategories[catId] = !expandedCategories[catId]"
                                   class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition group cursor-pointer">
                                    <i :class="expandedCategories[catId] ? 'fa-solid fa-folder-open' : 'fa-solid fa-folder'"
                                       class="text-gray-400 group-hover:text-gray-600 dark:group-hover:text-gray-300 text-sm"></i>
                                    <span class="text-sm text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-gray-200 flex-1" x-text="category.name[$store.app.lang]"></span>
                                    <span class="text-xs text-gray-400 dark:text-gray-500" x-text="BLOG_DATA.getPostsByCategory(catId).length"></span>
                                    <i :class="expandedCategories[catId] ? 'fa-solid fa-chevron-down' : 'fa-solid fa-chevron-right'"
                                       class="text-xs text-gray-400 transition-transform duration-200"></i>
                                </a>

                                <!-- 展开的文章列表 -->
                                <div x-show="expandedCategories[catId]"
                                     x-transition:enter="transition ease-out duration-200"
                                     x-transition:enter-start="opacity-0 -translate-y-2"
                                     x-transition:enter-end="opacity-100 translate-y-0"
                                     x-transition:leave="transition ease-in duration-150"
                                     x-transition:leave-start="opacity-100 translate-y-0"
                                     x-transition:leave-end="opacity-0 -translate-y-2"
                                     class="ml-4 mt-1 space-y-1">
                                    <template x-for="post in BLOG_DATA.getPostsByCategory(catId)" :key="post.id">
                                        <a :href="`post.html?id=${post.id}`"
                                           class="block px-2 py-1.5 text-xs text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-800 rounded transition">
                                            <span x-text="post.title[$store.app.lang]"></span>
                                        </a>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </aside>

        </div>
    </main>

    <!-- 页脚 -->
    <footer class="py-12 text-center text-gray-500 text-sm border-t dark:border-gray-800 mt-12">
        <p>© 2025 CHEN Yiming. All rights reserved.</p>
    </footer>

    <!-- Blogs 数据 -->
    <script src="assets/js/blogs-data.js"></script>
    <script>
        // 搜索组件函数
        function searchComponent() {
            return {
                searchQuery: '',
                showResults: false,
                searchResults: [],
                searchPosts() {
                    const query = this.searchQuery.toLowerCase().trim();
                    const lang = Alpine.store('app').lang;

                    if (query.length === 0) {
                        this.searchResults = [];
                        return;
                    }

                    this.searchResults = BLOG_DATA.posts.filter(post => {
                        const title = post.title[lang].toLowerCase();
                        const desc = post.description[lang].toLowerCase();
                        return title.includes(query) || desc.includes(query);
                    }).slice(0, 5); // 最多显示5条结果
                }
            };
        }

        // 获取 URL 参数中的文章 ID
        function getPostIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // 加载文章
        async function loadPost() {
            const postId = getPostIdFromUrl();
            if (!postId) {
                showNotFound();
                return;
            }

            const post = BLOG_DATA.getPostById(postId);
            if (!post) {
                showNotFound();
                return;
            }

            // 设置当前文章和导航
            Alpine.store('app').currentPost = post;
            Alpine.store('app').prevPost = BLOG_DATA.getPreviousPost(postId);
            Alpine.store('app').nextPost = BLOG_DATA.getNextPost(postId);

            // 更新页面标题
            const lang = Alpine.store('app').lang;
            document.title = `${post.title[lang]} - Yiming Chen`;

            // 加载 Markdown 内容
            try {
                const response = await fetch(post.mdFile);
                if (!response.ok) throw new Error('Failed to load markdown');
                const markdown = await response.text();

                // 计算阅读时间（去除markdown语法后按400字/分钟计算）
                const plainText = markdown
                    .replace(/#{1,6}\s/g, '') // 移除标题标记
                    .replace(/\*\*/g, '') // 移除粗体标记
                    .replace(/\*/g, '') // 移除斜体标记
                    .replace(/`/g, '') // 移除代码标记
                    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // 移除链接，保留文本
                    .replace(/!\[([^\]]*)\]\([^)]+\)/g, '') // 移除图片
                    .replace(/^>\s/gm, '') // 移除引用标记
                    .replace(/^[-*+]\s/gm, '') // 移除列表标记
                    .replace(/^\d+\.\s/gm, '') // 移除有序列表标记
                    .replace(/---+/g, '') // 移除分割线
                    .replace(/\n+/g, ' ') // 将换行转为空格
                    .trim();
                const charCount = plainText.length;
                const readTimeMinutes = Math.max(1, Math.ceil(charCount / 500));
                Alpine.store('app').readTime = readTimeMinutes;

                // 渲染 Markdown
                const htmlContent = marked.parse(markdown);
                document.getElementById('markdown-content').innerHTML = htmlContent;

                // 重新渲染 MathJax 公式
                if (window.MathJax && window.MathJax.typesetPromise) {
                    await window.MathJax.typesetPromise(['#markdown-content']);
                }

                // 生成目录
                generateTableOfContents();

                // 显示内容
                Alpine.store('app').showContent = true;

            } catch (error) {
                console.error('Error loading markdown:', error);
                showNotFound();
            }
        }

        function showNotFound() {
            Alpine.store('app').notFound = true;
        }

        // 页面加载时执行
        document.addEventListener('alpine:init', () => {
            loadPost();
        });

        // 目录功能
        function generateTableOfContents() {
            const markdownContent = document.getElementById('markdown-content');
            if (!markdownContent) return;

            const headings = markdownContent.querySelectorAll('h2, h3, h4, h5, h6');
            const tocDesktop = document.getElementById('toc-desktop');
            const tocMobile = document.getElementById('toc-mobile');

            if (headings.length === 0) {
                tocDesktop?.closest('aside')?.remove();
                return;
            }

            // 为每个标题添加 ID
            headings.forEach((heading, index) => {
                if (!heading.id) {
                    const text = heading.textContent.trim();
                    const baseId = text.toLowerCase()
                        .replace(/[^\w\s-]/g, '')
                        .replace(/\s+/g, '-')
                        .substring(0, 50);
                    heading.id = `${baseId}-${index}`;
                }
            });

            // 生成目录 HTML
            const generateTocHTML = () => {
                let html = '<ul class="toc-list">';
                headings.forEach(heading => {
                    const level = parseInt(heading.tagName.charAt(1));
                    const text = heading.textContent.trim();
                    const id = heading.id;

                    html += `
                        <li class="toc-item">
                            <a href="#${id}"
                               class="toc-link toc-level-${level}"
                               data-target="${id}"
                               data-level="${level}">
                                ${text}
                            </a>
                        </li>
                    `;
                });
                html += '</ul>';
                return html;
            };

            // 渲染目录
            if (tocDesktop) tocDesktop.innerHTML = generateTocHTML();
            if (tocMobile) tocMobile.innerHTML = generateTocHTML();

            // 平滑滚动到锚点
            document.querySelectorAll('.toc-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetId = link.getAttribute('data-target');
                    const targetElement = document.getElementById(targetId);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        // 更新 URL 不触发页面跳转
                        history.pushState(null, null, `#${targetId}`);
                        // 高亮当前目录项
                        updateActiveTocItem(targetId);
                    }
                });
            });

            // 监听滚动，更新高亮
            let ticking = false;
            window.addEventListener('scroll', () => {
                if (!ticking) {
                    window.requestAnimationFrame(() => {
                        updateActiveTocOnScroll();
                        ticking = false;
                    });
                    ticking = true;
                }
            }, { passive: true });

            // 初始化时更新一次
            setTimeout(updateActiveTocOnScroll, 100);
        }

        // 更新激活的目录项
        function updateActiveTocItem(targetId) {
            document.querySelectorAll('.toc-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-target') === targetId) {
                    link.classList.add('active');

                    // 将激活项滚动到目录容器的中间位置
                    const tocContainer = link.closest('nav');
                    if (tocContainer) {
                        const containerHeight = tocContainer.clientHeight;
                        const linkOffsetTop = link.offsetTop;
                        const linkHeight = link.clientHeight;

                        // 计算滚动位置，使链接居中
                        const scrollTop = linkOffsetTop - (containerHeight / 2) + (linkHeight / 2);
                        tocContainer.scrollTo({
                            top: scrollTop,
                            behavior: 'smooth'
                        });
                    }
                }
            });
        }

        // 根据滚动位置更新激活的目录项
        function updateActiveTocOnScroll() {
            const markdownContent = document.getElementById('markdown-content');
            if (!markdownContent) return;

            const headings = markdownContent.querySelectorAll('h2, h3, h4, h5, h6');
            const scrollPos = window.scrollY + 150;

            let activeId = null;
            let firstHeading = null;

            headings.forEach(heading => {
                if (!firstHeading) firstHeading = heading;
                if (heading.offsetTop <= scrollPos) {
                    activeId = heading.id;
                }
            });

            // 如果还没滚动到第一个标题，不高亮任何项
            if (!activeId && firstHeading && firstHeading.offsetTop > scrollPos) {
                activeId = null;
            }

            // 如果已经滚动到页面底部，高亮最后一个标题
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
                const lastHeading = headings[headings.length - 1];
                if (lastHeading) activeId = lastHeading.id;
            }

            if (activeId) {
                updateActiveTocItem(activeId);
            } else {
                document.querySelectorAll('.toc-link').forEach(link => {
                    link.classList.remove('active');
                });
            }
        }
    </script>
</body>
</html>
