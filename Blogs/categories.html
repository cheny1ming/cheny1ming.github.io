<!DOCTYPE html>
<html lang="en" x-data="categoriesApp()" :class="{ 'dark': $store.app.darkMode }" :data-theme="$store.app.darkMode ? 'dark' : 'light'">
<script>
// 在页面渲染前立即应用主题，防止闪烁
(function() {
    const theme = localStorage.getItem('theme') || 'light';
    if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', 'dark');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
    }
})();
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - Yiming Chen</title>
    <!-- 外部资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="../assets/css/custom.css">

    <style>
        /* Alpine.js x-cloak 样式 - 防止闪烁 */
        [x-cloak] { display: none !important; }
    </style>

    <!-- 配置 -->
    <script>
        const savedLang = localStorage.getItem('lang') || 'en';
        const savedTheme = localStorage.getItem('theme') || 'light';
        const savedDarkMode = savedTheme === 'dark';

        document.addEventListener('alpine:init', () => {
            Alpine.store('app', Alpine.reactive({
                lang: savedLang,
                darkMode: savedDarkMode,
                mobileMenuOpen: false
            }));

            Alpine.effect(() => {
                localStorage.setItem('lang', Alpine.store('app').lang);
            });

            Alpine.effect(() => {
                const darkMode = Alpine.store('app').darkMode;
                const theme = darkMode ? 'dark' : 'light';
                localStorage.setItem('theme', theme);
                document.documentElement.setAttribute('data-theme', theme);
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            });
        });

        // Categories 应用逻辑
        function categoriesApp() {
            return {
                expandedCategory: null,

                toggleCategory(categoryId) {
                    if (this.expandedCategory === categoryId) {
                        this.expandedCategory = null;
                    } else {
                        this.expandedCategory = categoryId;
                    }
                },

                getPosts(categoryId) {
                    return BLOG_DATA.getPostsByCategory(categoryId);
                },

                getPostCount(categoryId) {
                    return this.getPosts(categoryId).length;
                },

                isExpanded(categoryId) {
                    return this.expandedCategory === categoryId;
                },

                getCategoryColor(category) {
                    const colors = {
                        'learning-notes': 'blue',
                        'project': 'green',
                        'essay': 'purple'
                    };
                    return colors[category] || 'gray';
                }
            }
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#1a1a1a',
                        darkCard: '#2d2d2d'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkBg dark:text-gray-200 antialiased">
    <!-- 导航 -->
    <nav class="sticky top-0 z-40 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b dark:border-gray-700">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="./" class="font-bold text-xl tracking-tighter hover:text-blue-500 transition">
                <i class="fa-solid fa-arrow-left mr-2"></i>
                <span x-show="$store.app.lang === 'zh'">返回博客</span>
                <span x-show="$store.app.lang === 'en'">Back to Blogs</span>
            </a>

            <div class="flex items-center space-x-4">
                <button @click="$store.app.lang = $store.app.lang === 'zh' ? 'en' : 'zh'" class="hover:text-blue-500">
                    <span x-show="$store.app.lang === 'zh'">EN</span>
                    <span x-show="$store.app.lang === 'en'">中</span>
                </button>
                <button @click="$store.app.darkMode = !$store.app.darkMode" class="theme-toggle text-lg" aria-label="Toggle Theme">
                    <i class="fa-solid fa-sun sun-icon"></i>
                    <i class="fa-solid fa-moon moon-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-extrabold mb-4 tracking-tight border-l-4 border-green-500 pl-4">
            <span x-show="$store.app.lang === 'zh'">分类</span>
            <span x-show="$store.app.lang === 'en'">Categories</span>
        </h1>
        <p class="text-gray-600 dark:text-gray-400 mb-12 ml-5">
            <span x-show="$store.app.lang === 'zh'">浏览不同主题的文章</span>
            <span x-show="$store.app.lang === 'en'">Browse articles by topic</span>
        </p>

        <!-- 分类卡片 -->
        <div class="space-y-6" x-cloak>
            <template x-for="[categoryId, category] in Object.entries(BLOG_DATA.categories)" :key="categoryId">
                <div class="bg-white dark:bg-darkCard rounded-2xl border border-gray-200 dark:border-gray-700 overflow-hidden transition-all duration-300"
                     :class="{ 'shadow-xl': isExpanded(categoryId) }">
                    <!-- 分类标题卡片 -->
                    <div @click="toggleCategory(categoryId)"
                         class="p-8 cursor-pointer hover:bg-gray-50 dark:hover:bg-darkCard/80 transition-colors">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-6">
                                <!-- 图标 -->
                                <div class="w-20 h-20 rounded-2xl flex items-center justify-center"
                                     :class="{
                                         'bg-blue-100 dark:bg-blue-900/30': getCategoryColor(categoryId) === 'blue',
                                         'bg-green-100 dark:bg-green-900/30': getCategoryColor(categoryId) === 'green',
                                         'bg-purple-100 dark:bg-purple-900/30': getCategoryColor(categoryId) === 'purple'
                                     }">
                                    <i :class="category.icon"
                                       class="text-4xl"
                                       :class="{
                                           'text-blue-500': getCategoryColor(categoryId) === 'blue',
                                           'text-green-500': getCategoryColor(categoryId) === 'green',
                                           'text-purple-500': getCategoryColor(categoryId) === 'purple'
                                       }"></i>
                                </div>

                                <!-- 分类信息 -->
                                <div>
                                    <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-1"
                                        x-text="category.name[$store.app.lang]"></h2>
                                    <p class="text-gray-600 dark:text-gray-400"
                                       x-text="category.description[$store.app.lang]"></p>
                                </div>
                            </div>

                            <!-- 文章数量和展开图标 -->
                            <div class="flex items-center space-x-4">
                                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
                                    <span x-text="getPostCount(categoryId)"></span>
                                    <span x-show="$store.app.lang === 'zh'" class="ml-1">篇文章</span>
                                    <span x-show="$store.app.lang === 'en'" class="ml-1">posts</span>
                                </span>
                                <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-300"
                                   :class="{ 'rotate-180': isExpanded(categoryId) }"></i>
                            </div>
                        </div>
                    </div>

                    <!-- 展开的文章列表 -->
                    <div x-show="isExpanded(categoryId)"
                         x-transition:enter="transition ease-out duration-300"
                         x-transition:enter-start="opacity-0 transform -translate-y-2"
                         x-transition:enter-end="opacity-100 transform translate-y-0"
                         class="border-t dark:border-gray-700 bg-gray-50 dark:bg-darkBg/50">
                        <div class="p-6">
                            <template x-if="getPostCount(categoryId) > 0">
                                <div class="space-y-4">
                                    <template x-for="post in getPosts(categoryId)" :key="post.id">
                                        <a :href="`post.html?id=${post.id}`"
                                           class="block bg-white dark:bg-darkCard rounded-xl p-5 border border-gray-200 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-500 hover:shadow-md transition-all">
                                            <div class="flex items-start justify-between gap-4">
                                                <div class="flex-1">
                                                    <h3 class="text-lg font-bold text-gray-900 dark:text-gray-100 hover:text-blue-500 transition mb-2"
                                                        x-text="post.title[$store.app.lang]"></h3>
                                                    <p class="text-gray-600 dark:text-gray-400 text-sm line-clamp-2 mb-3"
                                                        x-text="post.description[$store.app.lang]"></p>
                                                    <div class="flex items-center gap-4 text-sm text-gray-500 dark:text-gray-500">
                                                        <span class="flex items-center">
                                                            <i class="fa-regular fa-calendar mr-1"></i>
                                                            <span x-text="BLOG_DATA.formatDate(post.date, $store.app.lang)"></span>
                                                        </span>
                                                        <div class="flex items-center gap-2">
                                                            <template x-for="tag in post.tags.slice(0, 3)" :key="tag">
                                                                <span class="px-2 py-0.5 rounded-full text-xs bg-gray-100 dark:bg-gray-700"
                                                                      x-text="tag"></span>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </div>
                                                <i class="fa-solid fa-arrow-right text-gray-400 dark:text-gray-600 flex-shrink-0 mt-1"></i>
                                            </div>
                                        </a>
                                    </template>
                                </div>
                            </template>

                            <template x-if="getPostCount(categoryId) === 0">
                                <div class="text-center py-8 text-gray-500 dark:text-gray-500">
                                    <i class="fa-solid fa-inbox text-4xl mb-3"></i>
                                    <p x-show="$store.app.lang === 'zh'">暂无文章</p>
                                    <p x-show="$store.app.lang === 'en'">No posts yet</p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- 空状态（当没有任何文章时） -->
        <div x-data="{ showEmpty: BLOG_DATA.getAllPosts().length === 0 }" x-show="showEmpty && Object.keys(BLOG_DATA.categories).every(cat => getPostCount(cat) === 0)"
             class="bg-gray-50 dark:bg-darkCard/50 p-12 rounded-3xl border border-dashed border-gray-300 dark:border-gray-700 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 dark:bg-green-900/30 text-green-500 mb-6">
                <i class="fa-solid fa-folder-open text-3xl"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 dark:text-gray-200 mb-3">
                <span x-show="$store.app.lang === 'zh'">分类为空</span>
                <span x-show="$store.app.lang === 'en'">Categories Empty</span>
            </h3>
            <p class="text-gray-600 dark:text-gray-400 max-w-md mx-auto">
                <span x-show="$store.app.lang === 'zh'">还没有发布任何文章，敬请期待！</span>
                <span x-show="$store.app.lang === 'en'">No articles published yet. Stay tuned!</span>
            </p>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="py-12 text-center text-gray-500 text-sm border-t dark:border-gray-800 mt-12">
        <p>© 2025 CHEN Yiming. Built with HTML & Tailwind.</p>
    </footer>

    <!-- Blogs 数据 -->
    <script src="assets/js/blogs-data.js"></script>
</body>
</html>
