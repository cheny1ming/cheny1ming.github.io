<!DOCTYPE html>
<html lang="en" x-data="categoriesApp()" :class="{ 'dark': $store.app.darkMode }" :data-theme="$store.app.darkMode ? 'dark' : 'light'">
<script>
// 在页面渲染前立即应用主题，防止闪烁
(function() {
    const theme = localStorage.getItem('theme') || 'light';
    if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', 'dark');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
    }
})();
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - Yiming Chen</title>
    <!-- 外部资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="../assets/css/custom.css">

    <style>
        /* Alpine.js x-cloak 样式 - 防止闪烁 */
        [x-cloak] { display: none !important; }
    </style>

    <!-- 配置 -->
    <script>
        const savedLang = localStorage.getItem('lang') || 'en';
        const savedTheme = localStorage.getItem('theme') || 'light';
        const savedDarkMode = savedTheme === 'dark';

        document.addEventListener('alpine:init', () => {
            Alpine.store('app', Alpine.reactive({
                lang: savedLang,
                darkMode: savedDarkMode,
                mobileMenuOpen: false
            }));

            Alpine.effect(() => {
                localStorage.setItem('lang', Alpine.store('app').lang);
            });

            Alpine.effect(() => {
                const darkMode = Alpine.store('app').darkMode;
                const theme = darkMode ? 'dark' : 'light';
                localStorage.setItem('theme', theme);
                document.documentElement.setAttribute('data-theme', theme);
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            });
        });

        // Categories 应用逻辑
        function categoriesApp() {
            return {
                selectedCategory: null,

                init() {
                    // 从URL获取category参数并自动选中
                    const urlParams = new URLSearchParams(window.location.search);
                    const categoryParam = urlParams.get('category');
                    if (categoryParam) {
                        this.selectedCategory = categoryParam;
                    }
                },

                selectCategory(categoryId) {
                    // 单选：如果点击已选中的分类，则取消选择；否则选中新分类
                    if (this.selectedCategory === categoryId) {
                        this.selectedCategory = null;
                    } else {
                        this.selectedCategory = categoryId;
                    }
                },

                clearFilter() {
                    this.selectedCategory = null;
                },

                getFilteredPosts() {
                    if (!this.selectedCategory) return [];
                    return BLOG_DATA.getPostsByCategory(this.selectedCategory);
                },

                getPostCount(categoryId) {
                    return BLOG_DATA.getPostsByCategory(categoryId).length;
                },

                getCategoryColor(category) {
                    const colors = {
                        'learning-notes': 'blue',
                        'paper-with-code': 'cyan',
                        'technical-report': 'amber',
                        'project': 'green',
                        'essay': 'purple'
                    };
                    return colors[category] || 'gray';
                }
            }
        }

        // 搜索组件函数
        function searchComponent() {
            return {
                searchQuery: '',
                showResults: false,
                searchResults: [],
                searchPosts() {
                    const query = this.searchQuery.toLowerCase().trim();
                    const lang = Alpine.store('app').lang;

                    if (query.length === 0) {
                        this.searchResults = [];
                        return;
                    }

                    this.searchResults = BLOG_DATA.posts.filter(post => {
                        const title = post.title[lang].toLowerCase();
                        const desc = post.description[lang].toLowerCase();
                        return title.includes(query) || desc.includes(query);
                    }).slice(0, 5);
                }
            };
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#1a1a1a',
                        darkCard: '#2d2d2d'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkBg dark:text-gray-200 antialiased">
    <!-- 导航 -->
    <nav class="sticky top-0 z-40 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b dark:border-gray-700">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="./" class="font-bold text-xl tracking-tighter hover:text-blue-500 transition">
                <i class="fa-solid fa-arrow-left mr-2"></i>
                <span x-show="$store.app.lang === 'zh'">返回博客</span>
                <span x-show="$store.app.lang === 'en'">Back to Blogs</span>
            </a>

            <div class="flex items-center space-x-4">
                <!-- 搜索框 -->
                <div class="relative hidden md:block" x-data="searchComponent()">
                    <input type="text"
                           :placeholder="$store.app.lang === 'zh' ? '搜索文章...' : 'Search articles...'"
                           x-model="searchQuery"
                           @focus="showResults = true"
                           @blur="setTimeout(() => showResults = false, 200)"
                           @input="searchPosts()"
                           class="w-48 lg:w-64 px-3 py-1.5 pl-9 text-sm bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>

                    <!-- 搜索结果下拉 -->
                    <div x-show="showResults && searchQuery.length > 0 && searchResults.length > 0"
                         x-cloak
                         class="absolute top-full right-0 mt-2 w-full bg-white dark:bg-darkCard border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl overflow-hidden z-50">
                        <div class="max-h-80 overflow-y-auto">
                            <template x-for="post in searchResults" :key="post.id">
                                <a :href="`post.html?id=${post.id}`"
                                   class="block px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800 transition border-b dark:border-gray-700 last:border-0">
                                    <p class="font-medium text-sm text-gray-900 dark:text-gray-100 mb-1" x-text="post.title[$store.app.lang]"></p>
                                    <p class="text-xs text-gray-500 dark:text-gray-400 line-clamp-1" x-text="post.description[$store.app.lang]"></p>
                                </a>
                            </template>
                        </div>
                    </div>

                    <!-- 无结果提示 -->
                    <div x-show="showResults && searchQuery.length > 0 && searchResults.length === 0"
                         x-cloak
                         class="absolute top-full right-0 mt-2 w-full bg-white dark:bg-darkCard border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl px-4 py-3 z-50">
                        <p class="text-sm text-gray-500 dark:text-gray-400 text-center">
                            <span x-show="$store.app.lang === 'zh'">未找到相关文章</span>
                            <span x-show="$store.app.lang === 'en'">No articles found</span>
                        </p>
                    </div>
                </div>

                <button @click="$store.app.lang = $store.app.lang === 'zh' ? 'en' : 'zh'" class="hover:text-blue-500">
                    <span x-show="$store.app.lang === 'zh'">EN</span>
                    <span x-show="$store.app.lang === 'en'">中</span>
                </button>
                <button @click="$store.app.darkMode = !$store.app.darkMode" class="theme-toggle text-lg" aria-label="Toggle Theme">
                    <i class="fa-solid fa-sun sun-icon"></i>
                    <i class="fa-solid fa-moon moon-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-extrabold mb-4 tracking-tight border-l-4 border-green-500 pl-4">
            <span x-show="$store.app.lang === 'zh'">分类</span>
            <span x-show="$store.app.lang === 'en'">Categories</span>
        </h1>
        <p class="text-gray-600 dark:text-gray-400 mb-12 ml-5">
            <span x-show="$store.app.lang === 'zh'">点击分类筛选相关文章</span>
            <span x-show="$store.app.lang === 'en'">Click categories to filter articles</span>
        </p>

        <!-- 分类云 -->
        <div class="bg-white dark:bg-darkCard rounded-2xl p-8 border border-gray-200 dark:border-gray-700 mb-8" x-cloak x-init="init()">
            <div class="flex flex-wrap gap-3">
                <template x-for="[categoryId, category] in Object.entries(BLOG_DATA.categories)" :key="categoryId">
                    <button @click="selectCategory(categoryId)"
                            class="group relative inline-flex items-center px-4 py-2 rounded-full font-medium transition-all duration-300 border border-gray-200 dark:border-gray-600"
                            :class="{
                                'bg-green-500 text-white border-green-500 shadow-lg scale-105': selectedCategory === categoryId,
                                'bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:border-blue-500 hover:text-blue-500': selectedCategory !== categoryId
                            }">
                        <i :class="category.icon" class="mr-2"></i>
                        <span x-text="category.name[$store.app.lang]"></span>
                        <span class="ml-2 px-2 py-0.5 rounded-full text-xs"
                              :class="{
                                  'bg-white/20': selectedCategory === categoryId,
                                  'bg-gray-200 dark:bg-gray-600': selectedCategory !== categoryId
                              }"
                              x-text="getPostCount(categoryId)"></span>
                    </button>
                </template>
            </div>
        </div>

        <!-- 筛选结果 -->
        <div x-show="selectedCategory" x-transition class="mb-8" x-cloak>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold flex items-center">
                    <i class="fa-solid fa-filter mr-3 text-green-500"></i>
                    <span x-show="$store.app.lang === 'zh'">筛选结果</span>
                    <span x-show="$store.app.lang === 'en'">Filtered Results</span>
                    <span class="ml-3 text-lg font-normal text-gray-500 dark:text-gray-400">
                        "<span x-text="BLOG_DATA.categories[selectedCategory]?.name[$store.app.lang]"></span>"
                    </span>
                </h2>
                <button @click="clearFilter()"
                        class="inline-flex items-center px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                    <i class="fa-solid fa-xmark mr-2"></i>
                    <span x-show="$store.app.lang === 'zh'">清除筛选</span>
                    <span x-show="$store.app.lang === 'en'">Clear Filter</span>
                </button>
            </div>

            <!-- 文章列表 -->
            <div class="space-y-4">
                <template x-if="getFilteredPosts().length > 0">
                    <div>
                        <template x-for="post in getFilteredPosts()" :key="post.id">
                            <a :href="`post.html?id=${post.id}`"
                               class="block bg-white dark:bg-darkCard rounded-xl p-6 border border-gray-200 dark:border-gray-700 hover:border-green-500 dark:hover:border-green-500 hover:shadow-lg transition-all duration-300">
                                <div class="flex items-start justify-between gap-4">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-3 mb-2 flex-wrap">
                                            <span class="text-sm text-gray-500 dark:text-gray-500">
                                                <i class="fa-regular fa-calendar mr-1"></i>
                                                <span x-text="BLOG_DATA.formatDate(post.date, $store.app.lang)"></span>
                                            </span>
                                            <template x-for="tag in post.tags" :key="tag">
                                                <span class="inline-flex items-center px-2 py-1 rounded-md text-xs bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
                                                    <i class="fa-solid fa-tag mr-1"></i>
                                                    <span x-text="BLOG_DATA.getTagName(tag, $store.app.lang)"></span>
                                                </span>
                                            </template>
                                        </div>
                                        <h3 class="text-xl font-bold text-gray-900 dark:text-gray-100 hover:text-green-500 transition mb-2"
                                            x-text="post.title[$store.app.lang]"></h3>
                                        <p class="text-gray-600 dark:text-gray-400 line-clamp-2"
                                           x-text="post.description[$store.app.lang]"></p>
                                    </div>
                                    <i class="fa-solid fa-arrow-right text-gray-400 dark:text-gray-600 flex-shrink-0 mt-1"></i>
                                </div>
                            </a>
                        </template>
                    </div>
                </template>

                <template x-if="getFilteredPosts().length === 0">
                    <div class="bg-gray-50 dark:bg-darkCard/50 p-12 rounded-3xl border border-dashed border-gray-300 dark:border-gray-700 text-center">
                        <i class="fa-solid fa-inbox text-4xl text-gray-400 mb-3"></i>
                        <p class="text-gray-500 dark:text-gray-500">
                            <span x-show="$store.app.lang === 'zh'">该分类暂无文章</span>
                            <span x-show="$store.app.lang === 'en'">No articles in this category</span>
                        </p>
                    </div>
                </template>
            </div>
        </div>

        <!-- 空状态 -->
        <div x-data="{ showEmpty: BLOG_DATA.getAllPosts().length === 0 }" x-show="showEmpty && Object.keys(BLOG_DATA.categories).every(cat => getPostCount(cat) === 0)"
             class="bg-gray-50 dark:bg-darkCard/50 p-12 rounded-3xl border border-dashed border-gray-300 dark:border-gray-700 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 dark:bg-green-900/30 text-green-500 mb-6">
                <i class="fa-solid fa-folder-open text-3xl"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 dark:text-gray-200 mb-3">
                <span x-show="$store.app.lang === 'zh'">分类为空</span>
                <span x-show="$store.app.lang === 'en'">Categories Empty</span>
            </h3>
            <p class="text-gray-600 dark:text-gray-400 max-w-md mx-auto">
                <span x-show="$store.app.lang === 'zh'">还没有发布任何文章，敬请期待！</span>
                <span x-show="$store.app.lang === 'en'">No articles published yet. Stay tuned!</span>
            </p>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="py-12 text-center text-gray-500 text-sm border-t dark:border-gray-800 mt-12">
        <p>© 2025 CHEN Yiming. All rights reserved.</p>
    </footer>

    <!-- Blogs 数据 -->
    <script src="assets/js/blogs-data.js"></script>
</body>
</html>
